<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wound Care EMR</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa;
}

.navbar{
background:#1f3a5f;
color:white;
padding:15px 25px;
}

.logo{
font-size:20px;
font-weight:bold;
}

.subtitle{
font-size:13px;
opacity:0.8;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
max-width:700px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#1f3a5f;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2f5d8a;
}

</style>

</head>

<body>

<div class="navbar">
<div class="logo">Wound Care EMR</div>
<div class="subtitle">Ns. Oki Hartono, S.Tr.Kep., CCWC</div>
</div>

<div class="container">

<div class="card">

<h2>Add Patient</h2>

<input id="mrn" placeholder="MRN">

<input id="name" placeholder="Patient Name">

<input id="dob" type="date">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="address" placeholder="Address">

<input id="phone" placeholder="Phone">

<button id="saveBtn">Save Patient</button>

</div>

</div>


<script>

const API_URL="https://script.google.com/macros/s/AKfycbym1BEI8_KE-UpvfXJWxf-xZ61_WhNAPcoCcQGlUVV7IIybdGYbSjWQq80jfhK6D8dR/exec";

document.getElementById("saveBtn").addEventListener("click", function(){

const data = {
MRN:document.getElementById("mrn").value,
Name:document.getElementById("name").value,
Date_of_Birth:document.getElementById("dob").value,
Gender:document.getElementById("gender").value,
Address:document.getElementById("address").value,
Phone:document.getElementById("phone").value
};

console.log(data);

fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"text/plain"
},
body:JSON.stringify(data)
})
.then(response=>response.text())
.then(result=>{
alert("Patient Saved To Database");
clearForm();
})
.catch(error=>{
alert("ERROR: Data gagal dikirim");
console.error(error);
});

});

function clearForm(){

document.getElementById("mrn").value="";
document.getElementById("name").value="";
document.getElementById("dob").value="";
document.getElementById("gender").value="";
document.getElementById("address").value="";
document.getElementById("phone").value="";

}

</script>

</body>
</html>
