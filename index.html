<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wound Care EMR</title>

<style>
body{
font-family:Arial;
background:#f4f6fa;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
max-width:500px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#1f3a5f;
color:white;
border:none;
padding:12px;
border-radius:5px;
cursor:pointer;
width:100%;
font-size:16px;
}

button:hover{
background:#2f5d8a;
}

</style>
</head>

<body>

<div class="card">

<h2>Add Patient</h2>

<input id="mrn" placeholder="MRN">
<input id="name" placeholder="Patient Name">
<input id="dob" type="date">

<select id="gender">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">

<button onclick="savePatient()">Save Patient</button>

</div>

<script>

function savePatient(){

alert("Tombol berhasil diklik");

}

</script>

</body>
</html>
