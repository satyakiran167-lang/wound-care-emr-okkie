<script>

const API_URL="https://script.google.com/macros/s/AKfycbx_Vcuo_p7fSYCrBIMkztQgYtk9norBOzvE8etwGkhfIjvcuaHtuGLGjMOrdaFFuhEQ/exec";

let isSaving=false;



function showSection(id){

document.querySelectorAll(".section").forEach(sec=>{
sec.classList.remove("active");
});

document.getElementById(id).classList.add("active");

loadPatients();

}



function generateMRN(total){

let number=total;

return "GV"+number.toString().padStart(3,'0');

}



function loadPatients(){

fetch(API_URL)
.then(res=>res.json())
.then(data=>{

let table=document.querySelector("#patientTable tbody");

if(!table) return;

table.innerHTML="";

data.slice(1).forEach(row=>{

let tr=document.createElement("tr");

row.forEach(cell=>{

let td=document.createElement("td");
td.innerText=cell;

tr.appendChild(td);

});

table.appendChild(tr);

});

document.getElementById("totalPatients").innerText=data.length-1;

});

}



function resetForm(){

document.getElementById("Name").value="";
document.getElementById("Date_of_Birth").value="";
document.getElementById("Gender").value="";
document.getElementById("Address").value="";
document.getElementById("Phone").value="";

}



function savePatient(){

if(isSaving) return;

isSaving=true;

let btn=document.getElementById("saveBtn");
let loader=document.getElementById("loader");
let status=document.getElementById("statusMsg");

btn.disabled=true;
loader.style.display="block";
status.innerText="Saving patient data...";


fetch(API_URL)
.then(res=>res.json())
.then(data=>{

let mrn=generateMRN(data.length);

let patient={

MRN:mrn,
Name:document.getElementById("Name").value,
Date_of_Birth:document.getElementById("Date_of_Birth").value,
Gender:document.getElementById("Gender").value,
Address:document.getElementById("Address").value,
Phone:document.getElementById("Phone").value

};


resetForm();


fetch(API_URL,{
method:"POST",
body:new URLSearchParams(patient)
})
.then(res=>res.text())
.then(()=>{

loader.style.display="none";

status.innerText="Patient saved successfully";

btn.disabled=false;

isSaving=false;

loadPatients();

});

});

}



window.onload=function(){

loadPatients();

}

</script>
