<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Wound Care EMR</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fa;
}

.navbar{
background:#1f3a5f;
color:white;
padding:15px 25px;
}

.logo{
font-size:20px;
font-weight:bold;
}

.subtitle{
font-size:13px;
opacity:0.8;
}

.container{
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
max-width:700px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
border-radius:5px;
border:1px solid #ccc;
font-size:14px;
}

button{
background:#1f3a5f;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#2f5d8a;
}

</style>

</head>


<body>

<div class="navbar">

<div class="logo">
Wound Care EMR
</div>

<div class="subtitle">
Ns. Oki Hartono, S.Tr.Kep., CCWC
</div>

</div>


<div class="container">

<div class="card">

<h2>Add Patient</h2>

<form action="https://script.google.com/macros/s/AKfycbym1BEI8_KE-UpvfXJWxf-xZ61_WhNAPcoCcQGlUVV7IIybdGYbSjWQq80jfhK6D8dR/exec" method="POST">

<input name="MRN" placeholder="MRN" required>

<input name="Name" placeholder="Patient Name" required>

<input name="Date_of_Birth" type="date" required>

<select name="Gender" required>

<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>

</select>

<input name="Address" placeholder="Address">

<input name="Phone" placeholder="Phone">

<button type="submit">
Save Patient
</button>

</form>

</div>

</div>

</body>
</html>
