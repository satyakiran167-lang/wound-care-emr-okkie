<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wound Care EMR</title>

<style>
body{
font-family:Arial;
background:#f4f6fa;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
max-width:500px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#1f3a5f;
color:white;
border:none;
padding:12px;
border-radius:5px;
cursor:pointer;
width:100%;
font-size:16px;
}

button:hover{
background:#2f5d8a;
}
</style>

</head>

<body>

<div class="card">

<h2>Add Patient</h2>

<form action="https://script.google.com/macros/s/AKfycbxSL5_82AE7u7yK-czTIP5NRvW1-_USr9V454oHQI8B62PyEDodvD1ERZ2Ew85KXeye/exec" method="POST">

<input name="MRN" placeholder="MRN" required>

<input name="Name" placeholder="Patient Name" required>

<input name="Date_of_Birth" type="date" required>

<select name="Gender" required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input name="Address" placeholder="Address">

<input name="Phone" placeholder="Phone">

<button type="submit">Save Patient</button>

</form>

</div>

</body>
</html>
